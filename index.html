<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>⛅ Weather App</h1>

        <div class="search-box">
            <input id="cityInput" type="text" placeholder="Enter a city name...">
            <button id="searchBtn">Search</button>
        </div>

        <p id="errorMsg" class="error hidden">City not found. Try again.</p>

        <div id="weatherResult" class="result hidden">
            <h2 id="cityName">--</h2>
            <p id="temperature" class="temp">--°C</p>
            <p id="description">--</p>
            <p id="humidity">Humidity: --%</p>
            <p id="wind">Wind: -- km/hr</p>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
